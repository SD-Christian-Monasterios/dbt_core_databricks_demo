name: CI
run-name: "CI · PR #${{ github.event.number }} · ${{ github.head_ref }} → ${{ github.base_ref }} · by @${{ github.actor }}"

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  dbt-ci:
    name: dbt compile
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # DBT Steps
      - name: Install dbt
        run: |
          pip install dbt-databricks
          

      - name: Set dbt credentials
        run: |
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "DATABRICKS_HOST=${{ vars.DATABRICKS_HOST_PROD }}" >> $GITHUB_ENV
            echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN_PROD }}" >> $GITHUB_ENV
            echo "DATABRICKS_HTTP_PATH=${{ vars.DATABRICKS_HTTP_PATH_PROD }}" >> $GITHUB_ENV
          else
            echo "DATABRICKS_HOST=${{ vars.DATABRICKS_HOST_DEV }}" >> $GITHUB_ENV
            echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN_DEV }}" >> $GITHUB_ENV
            echo "DATABRICKS_HTTP_PATH=${{ vars.DATABRICKS_HTTP_PATH_DEV }}" >> $GITHUB_ENV
          fi

      - name: Create profiles.yml
        run: |
          cat <<EOF > dbt/profiles.yml
          dbt_core_databricks_demo:
            target: ci
            outputs:
              ci:
                type: databricks
                host: "$DATABRICKS_HOST"
                http_path: "$DATABRICKS_HTTP_PATH"
                token: "$DATABRICKS_TOKEN"
                schema: default
                threads: 4
          EOF

      - name: Install dbt dependencies
        run: dbt deps
        working-directory: ./dbt

      - name: Compile dbt project
        run: dbt compile
        working-directory: ./dbt

  # Databricks Steps
  bundle-validate:
    name: Bundle validate (prod)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Set bundle credentials
        run: |
          echo "DATABRICKS_HOST=https://${{ vars.DATABRICKS_HOST_PROD }}" >> $GITHUB_ENV
          echo "DATABRICKS_TOKEN=${{ secrets.DATABRICKS_TOKEN_PROD }}" >> $GITHUB_ENV

      - name: Bundle validate — prod
        run: |
          databricks bundle validate --target prod \
            --var="warehouse_id=${{ vars.WAREHOUSE_ID_PROD }}" \
            --var="git_url=${{ vars.GIT_URL }}"
        working-directory: dab
