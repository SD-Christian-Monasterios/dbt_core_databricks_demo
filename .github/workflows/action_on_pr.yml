name: dbt Core CI validation
run-name: Validate dbt project on Pull Request

on:
  pull_request:
    branches:
      - dev
      - main
    paths:
      - 'dbt/models/**'
      - 'dbt/macros/**'
      - 'dbt/tests/**'
      - 'dbt/dbt_project.yml'
      - 'dbt/packages.yml'
      - 'dab/**'


env:
  DATABRICKS_TOKEN: ${{secrets.DATABRICKS_TOKEN}}
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_HTTP_PATH: ${{ vars.DATABRICKS_HTTP_PATH }}

jobs:
  dbt-ci:
    name: dbt compile
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # DBT Steps
      - name: Install dbt
        run: |
          pip install dbt-databricks

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > dbt/profiles.yml
          dbt_core_databricks_demo:
            target: dev
            outputs:
              dev:
                host: "$DATABRICKS_HOST"
                http_path: "$DATABRICKS_HTTP_PATH"
                schema: default
                threads: 1
                token: "{{ env_var('DATABRICKS_TOKEN') }}"
                type: databricks
          EOF

      - name: Install dbt dependencies
        run: dbt deps
        working-directory: ./dbt

      - name: Compile dbt project
        run: dbt compile
        working-directory: ./dbt

  bundle-validate:
    name: Bundle validate (prod)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'    # solo corre cuando el PR apunta a main
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Bundle validate — prod
        run: databricks bundle validate --target prod
        working-directory: dab
