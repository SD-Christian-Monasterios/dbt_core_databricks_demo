name: dbt Core CI validation
run-name: Validate dbt project on Pull Request

on:
  pull_request:
    branches:
      - main
    paths:
      - 'dbt/models/**'
      - 'dbt/macros/**'
      - 'dbt/tests/**'
      - 'dbt/dbt_project.yml'
      - 'dbt/packages.yml'


env:
  DATABRICKS_TOKEN: ${{secrets.DATABRICKS_TOKEN}}
  DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
  DATABRICKS_HTTP_PATH: ${{ vars.DATABRICKS_HTTP_PATH }}

jobs:
  dbt-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
#     dbt validations
      - name: pre check
        run: cat ./dbt/packages.yml

      - name: Install dbt
        run: |
          pip install dbt-databricks

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat <<EOF > ~/.dbt/profiles.yml
          dbt_core_databricks_demo:
            target: dev
            outputs:
              dev:
                host: "$DATABRICKS_HOST"
                http_path: "$DATABRICKS_HTTP_PATH"
                schema: default
                threads: 1
                token: "{{ env_var('DATABRICKS_TOKEN') }}"
                type: databricks
          EOF

      - name: Install dbt dependencies
        run: dbt deps
        working-directory: ./dbt

      - name: Parse dbt project
        run: dbt parse
        working-directory: ./dbt

      - name: Compile dbt project
        run: dbt compile
        working-directory: ./dbt

      - name: post_check
        run: cat ./dbt/packages.yml

#     Databricks Job Validation
#      - name: Validate Databricks Asset Bundle
#        run: databricks bundle validate
