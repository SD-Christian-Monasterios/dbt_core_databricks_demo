 resources:
   jobs:
     dbt_demo_run:
      name: dbt-demo-job-run
      schedule:
        quartz_cron_expression: "0 0 11 * * ?"
        timezone_id: "UTC"
        pause_status: "UNPAUSED"
      tasks:
        - task_key: job_for_dbt
          dbt_task:
            project_directory: dbt
            commands:
              - dbt deps
              - dbt compile
            warehouse_id: c4d20a2db40ba654
            source: GIT
          environment_key: job_for_dbt_environment
      git_source:
        git_url: https://github.com/SD-Christian-Monasterios/dbt_core_databricks_demo.git
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: job_for_dbt_environment
          spec:
            dependencies:
              - dbt-databricks>=1.0.0,<2.0.0
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED