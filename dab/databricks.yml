bundle:
  name: dab-demo-dbt

include:
  - resources/*.yml

targets:
  dev:
    # Enables DEV Mode
    mode: development
    # Enables DEV Mode
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
  prod:
    workspace:
#      host: https://dbc-56f60291-144c.cloud.databricks.com/
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}

